name: tests

on: [push, pull_request]

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - otp: "27.0"
            elixir: "1.18"
    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-${{ matrix.elixir }}-otp${{ matrix.otp }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.elixir }}-otp${{ matrix.otp }}-mix-
      - run: mix deps.get
      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d azurite s3ninja redis
          for i in {1..10}; do
            if nc -z localhost 10000 && nc -z localhost 9444 && nc -z localhost 6379; then
              echo "All test services are reachable"
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.test.yml logs azurite s3ninja redis
          exit 1
      - run: mix format --check-formatted
      - run: mix coveralls.json
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: cover/excoveralls.json
          fail_ci_if_error: false
